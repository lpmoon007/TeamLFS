<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Backlash — AI-Refereed Reputational Firestorm (CEO)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet" />
<style>
  :root{
    --navy:#0C2340; --steel:#185FA5; --steel-deep:#134C84; --bg:#EEF1F4; --surface:#FFFFFF;
    --border:#E1E4EA; --border-soft:#EBEDF1; --muted:#6B7480; --muted-soft:#8E97A3; --ink:#1B2733;
    --steel-tint:#EAF1F9; --steel-tint-edge:#CFE0F1;
    --good:#2F8A5B; --good-bg:#E9F5EE; --amber:#B4732F; --amber-bg:#FBF2E7; --alert:#C0483C; --alert-bg:#FBECEC;
    --shadow:0 1px 3px rgba(12,35,64,.06); --shadow-md:0 6px 22px rgba(12,35,64,.10); --shadow-lg:0 18px 50px rgba(12,35,64,.20);
    --panel:#F1F3F6;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;}
  .mono{font-family:'JetBrains Mono',monospace;}
  ::-webkit-scrollbar{width:9px;} ::-webkit-scrollbar-thumb{background:rgba(12,35,64,.15);border-radius:5px;}
  button{font-family:inherit;cursor:pointer;}

  /* ticker */
  .ticker{position:sticky;top:0;z-index:30;background:var(--navy);color:#fff;overflow:hidden;height:32px;display:flex;align-items:center;border-bottom:1px solid #0a1c33;}
  .ticker-track{display:flex;gap:26px;white-space:nowrap;padding-left:16px;animation:scrollx 40s linear infinite;}
  .ticker:hover .ticker-track{animation-play-state:paused;}
  @keyframes scrollx{from{transform:translateX(0);}to{transform:translateX(-50%);}}
  .tk{display:inline-flex;align-items:center;gap:7px;font-size:11.5px;font-family:'JetBrains Mono',monospace;color:#C6D5E6;}
  .tk .dot{width:5px;height:5px;border-radius:50%;background:var(--amber);}

  .stage{max-width:900px;margin:0 auto;padding:0 20px 240px;}

  /* HUD */
  #hud{position:sticky;top:32px;z-index:20;}
  .hud{position:sticky;top:0;z-index:20;background:rgba(238,241,244,.96);backdrop-filter:blur(8px);border-bottom:1px solid var(--border);padding:12px 0 12px;margin-bottom:16px;}
  .hud-top{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:10px;}
  .co{display:flex;align-items:center;gap:11px;}
  .co-logo{width:34px;height:34px;border-radius:9px;background:linear-gradient(150deg,#1B4C82,#0C2340);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;}
  .co-name{font-size:14.5px;font-weight:600;letter-spacing:-.01em;}
  .co-sub{font-size:11px;color:var(--muted);}
  .clock{display:flex;align-items:center;gap:14px;}
  .wkbox{text-align:right;}
  .wkbox .n{font-size:14px;font-weight:600;} .wkbox .l{font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted-soft);}
  .days{display:flex;gap:4px;align-items:center;}
  .day-dot{width:16px;height:6px;border-radius:3px;background:#D3D8E0;transition:background .3s;}
  .day-dot.past{background:var(--steel);} .day-dot.now{background:var(--amber);animation:pulseday 1.1s ease-in-out infinite;}
  @keyframes pulseday{0%,100%{opacity:1;}50%{opacity:.45;}}
  .daylabel{font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace;min-width:64px;text-align:right;}
  .meters{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;}
  .meter{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:8px 11px;}
  .meter .mh{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
  .meter .ml{font-size:9.5px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);}
  .meter .mv{font-size:12.5px;font-weight:700;font-family:'JetBrains Mono',monospace;}
  .bar{height:5px;border-radius:3px;background:#E7EAEF;overflow:hidden;}
  .bar span{display:block;height:100%;border-radius:3px;transition:width .7s cubic-bezier(.4,0,.2,1),background .4s;}
  .flash{animation:flash 1s ease;} @keyframes flash{0%{box-shadow:0 0 0 2px var(--amber) inset;}100%{box-shadow:none;}}

  /* intro */
  .intro{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:32px 34px;box-shadow:var(--shadow);margin-top:24px;}
  .intro .kick{font-size:10.5px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--amber);margin-bottom:13px;}
  .intro h1{font-size:29px;font-weight:600;letter-spacing:-.02em;line-height:1.12;margin:0 0 8px;}
  .intro .role{font-size:14px;color:var(--steel-deep);font-weight:500;margin-bottom:16px;}
  .intro p{font-size:14px;line-height:1.65;color:#38424E;margin:0 0 13px;}
  .intro .setup{background:var(--amber-bg);border:1px solid #EAD9C2;border-radius:11px;padding:14px 16px;margin:16px 0 12px;}
  .intro .setup b{color:var(--navy);}
  .grade-list{margin:9px 0 0;padding-left:20px;} .grade-list li{font-size:14px;line-height:1.55;color:#38424E;margin:3px 0;}
  .disp-h{font-size:10.5px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted-soft);margin:22px 0 10px;}
  .disp-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:6px;}
  .disp{text-align:left;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:13px 15px;transition:.13s;}
  .disp:hover{border-color:var(--steel-tint-edge);}
  .disp.on{border-color:var(--steel);background:var(--steel-tint);box-shadow:0 0 0 1px var(--steel) inset;}
  .disp .dt{font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px;margin-bottom:4px;}
  .disp .dtag{font-size:9px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:2px 7px;border-radius:100px;background:var(--panel);color:var(--muted);}
  .disp.on .dtag{background:var(--steel);color:#fff;}
  .disp .dc{font-size:11.5px;line-height:1.5;color:var(--muted);}
  .start-btn{width:100%;background:var(--steel);color:#fff;border:none;border-radius:11px;padding:15px;font-size:15px;font-weight:600;transition:.14s;margin-top:14px;}
  .start-btn:hover{background:var(--steel-deep);}

  /* week banner */
  .weekbanner{background:linear-gradient(150deg,#12233b,#0C2340);color:#D6E2F0;border-radius:14px;padding:20px 22px;margin-top:20px;margin-bottom:16px;box-shadow:var(--shadow-md);animation:rise .4s ease both;}
  .weekbanner .wb-k{font-size:10px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:#7FA6D0;margin-bottom:8px;}
  .weekbanner h2{font-size:20px;font-weight:600;letter-spacing:-.01em;margin:0 0 9px;color:#fff;}
  .weekbanner p{font-size:13px;line-height:1.6;margin:0;color:#C6D5E6;}

  @keyframes rise{from{opacity:0;transform:translateY(9px);}to{opacity:1;transform:none;}}
  .feed{display:flex;flex-direction:column;gap:12px;}
  .card-actions{margin-top:11px;display:flex;gap:8px;}
  .reply-inline{font-size:12px;font-weight:600;color:var(--steel);background:var(--steel-tint);border:1px solid var(--steel-tint-edge);border-radius:8px;padding:6px 12px;cursor:pointer;transition:background .15s;}
  .reply-inline:hover{background:#d9e7f5;}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:14px 17px;box-shadow:var(--shadow);animation:rise .4s ease both;}
  .card.inbound{border-left:3px solid var(--steel-tint-edge);border-radius:3px 13px 13px 3px;}
  .card.surprise{border-left:3px solid var(--alert);border-radius:3px 13px 13px 3px;background:linear-gradient(180deg,#fff, #fdf6f5);}
  .card.reply{border-left:3px solid var(--good);border-radius:3px 13px 13px 3px;background:#f8fbf9;}
  .card.reveal{border-left:3px solid var(--amber);border-radius:3px 13px 13px 3px;background:#fffdf8;}
  .c-from{display:flex;align-items:center;gap:9px;margin-bottom:8px;}
  .c-av{width:27px;height:27px;border-radius:50%;color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;flex-shrink:0;}
  .c-name{font-size:12.5px;font-weight:600;} .c-role{font-size:10.5px;color:var(--muted);}
  .c-time{margin-left:auto;font-size:10px;color:var(--muted-soft);font-family:'JetBrains Mono',monospace;}
  .c-title{font-size:14px;font-weight:600;margin:0 0 6px;letter-spacing:-.01em;}
  .c-body{font-size:13px;line-height:1.6;color:#38424E;margin:0;}
  .c-kick{font-size:9.5px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;margin-bottom:7px;}
  .c-kick.surprise{color:var(--alert);} .c-kick.reply{color:var(--good);} .c-kick.reveal{color:var(--amber);}
  .surprise-actions{display:flex;gap:8px;margin-top:11px;}
  .mini-btn{font-size:11.5px;font-weight:600;border:1px solid var(--border);background:var(--surface);color:var(--steel-deep);border-radius:8px;padding:7px 13px;transition:.12s;}
  .mini-btn:hover{border-color:var(--steel);background:var(--steel-tint);}

  /* team rail */
  .rail{position:sticky;top:186px;z-index:15;background:rgba(238,241,244,.96);backdrop-filter:blur(6px);padding:10px 0 12px;margin-bottom:6px;border-bottom:1px solid var(--border-soft);}
  .rail-h{font-size:9.5px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted-soft);margin-bottom:9px;}
  .rail-row{display:flex;gap:8px;flex-wrap:wrap;}
  .tchip{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:100px;padding:4px 6px 4px 5px;transition:.12s;}
  .tchip .av{width:26px;height:26px;border-radius:50%;color:#fff;display:flex;align-items:center;justify-content:center;font-size:9.5px;font-weight:600;position:relative;}
  .tchip .av .on{position:absolute;bottom:-1px;right:-1px;width:8px;height:8px;border-radius:50%;background:var(--good);border:1.5px solid #fff;}
  .tchip .tn{font-size:11px;font-weight:600;line-height:1.1;} .tchip .tr{font-size:9.5px;color:var(--muted);}
  .tchip .ask{font-size:10.5px;font-weight:600;color:var(--steel-deep);background:var(--steel-tint);border:1px solid var(--steel-tint-edge);border-radius:100px;padding:4px 10px;margin-left:2px;transition:.12s;}
  .tchip .ask:hover{background:var(--steel);color:#fff;border-color:var(--steel);}
  .tchip.silent{box-shadow:0 0 0 1px var(--amber-bg) inset;}

  /* decision dock */
  .dock{position:fixed;left:0;right:0;bottom:32px;z-index:25;background:rgba(255,255,255,.97);backdrop-filter:blur(8px);border-top:1px solid var(--border);box-shadow:0 -8px 30px rgba(12,35,64,.10);}
  .dock-in{max-width:900px;margin:0 auto;padding:12px 20px 14px;}
  .dock-lbl{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
  .dock-lbl .l{font-size:10.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted-soft);}
  .dock-lbl .adv{font-size:11px;color:var(--muted);}
  .dock-row{display:flex;gap:10px;align-items:flex-end;}
  .dock textarea{flex:1;resize:none;border:1px solid var(--border);border-radius:11px;padding:11px 13px;font-family:inherit;font-size:13px;line-height:1.5;color:var(--ink);min-height:46px;max-height:120px;background:var(--surface);transition:border .12s;}
  .dock textarea:focus{outline:none;border-color:var(--steel);}
  .dock .send{background:var(--steel);color:#fff;border:none;border-radius:11px;padding:12px 20px;font-size:13.5px;font-weight:600;transition:.14s;white-space:nowrap;}
  .dock .send:hover{background:var(--steel-deep);} .dock .send:disabled{opacity:.4;cursor:default;}
  .dock .more{background:var(--surface);color:var(--amber);border:1px solid #EAD9C2;border-radius:11px;padding:12px 15px;font-size:12.5px;font-weight:600;white-space:nowrap;transition:.12s;}
  .dock .more:hover{background:var(--amber-bg);} .dock .more:disabled{opacity:.35;cursor:default;}

  /* compose modal */
  .scrim{position:fixed;inset:0;z-index:60;background:rgba(12,25,45,.42);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;padding:24px;animation:fade .18s ease;}
  @keyframes fade{from{opacity:0;}to{opacity:1;}}
  .modal{background:var(--surface);border-radius:16px;box-shadow:var(--shadow-lg);width:100%;max-width:460px;overflow:hidden;animation:rise .22s ease both;}
  .modal-h{display:flex;align-items:center;gap:11px;padding:16px 18px;border-bottom:1px solid var(--border);}
  .modal-h .av{width:34px;height:34px;border-radius:50%;color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;}
  .modal-h .nm{font-size:14px;font-weight:600;} .modal-h .rl{font-size:11px;color:var(--muted);}
  .modal-h .x{margin-left:auto;background:none;border:none;font-size:20px;color:var(--muted-soft);line-height:1;}
  .modal-b{padding:16px 18px;}
  .modal-b .hint{font-size:11.5px;color:var(--muted);margin:0 0 10px;line-height:1.5;}
  .modal-b textarea{width:100%;resize:none;border:1px solid var(--border);border-radius:11px;padding:11px 13px;font-family:inherit;font-size:13px;line-height:1.5;min-height:72px;}
  .modal-b textarea:focus{outline:none;border-color:var(--steel);}
  .modal-actions{display:flex;gap:9px;margin-top:12px;}
  .modal-actions button{flex:1;border-radius:10px;padding:11px;font-size:12.5px;font-weight:600;transition:.12s;}
  .modal-actions .vm{background:var(--surface);border:1px solid var(--border);color:var(--ink);}
  .modal-actions .snd{background:var(--steel);border:1px solid var(--steel);color:#fff;}
  .modal-actions .snd:disabled{opacity:.4;cursor:default;}
  .cost-note{font-size:10.5px;color:var(--muted-soft);text-align:center;margin-top:9px;}

  .thinking{display:inline-flex;gap:3px;align-items:center;}
  .thinking span{width:5px;height:5px;border-radius:50%;background:var(--muted-soft);animation:blink 1.2s infinite;}
  .thinking span:nth-child(2){animation-delay:.2s;} .thinking span:nth-child(3){animation-delay:.4s;}
  @keyframes blink{0%,80%,100%{opacity:.25;}40%{opacity:1;}}

  /* week transition */
  .transition{background:linear-gradient(150deg,#12233b,#0C2340);color:#fff;border-radius:16px;padding:26px 30px;margin-top:20px;box-shadow:var(--shadow-md);animation:rise .4s ease both;}
  .transition .tk2{font-size:10px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:#7FA6D0;margin-bottom:10px;}
  .transition h2{font-size:20px;font-weight:600;margin:0 0 12px;letter-spacing:-.01em;}
  .transition p{font-size:13.5px;line-height:1.65;color:#D6E2F0;margin:0 0 12px;}
  .movement{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:14px 16px;margin:4px 0 14px;}
  .movement .mv-h{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#8FB0D6;margin-bottom:10px;}
  .movement .mv-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px 22px;}
  .mv-row{display:flex;align-items:baseline;justify-content:space-between;font-size:13px;color:#C6D5E7;padding-bottom:5px;border-bottom:1px solid rgba(255,255,255,.07);}
  .mv-row .mv-val{font-weight:700;font-family:'JetBrains Mono',monospace;font-size:12.5px;}
  .mv-row.up .mv-val{color:#7BD69C;} .mv-row.dn .mv-val{color:#F0968C;} .mv-row.flat .mv-val{color:#7C8A99;font-weight:500;}
  .react-row{display:flex;gap:10px;margin-top:12px;}
  .react-av{width:28px;height:28px;border-radius:50%;color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;flex-shrink:0;}
  .react-bub{background:rgba(255,255,255,.10);border-radius:4px 12px 12px 12px;padding:9px 12px;}
  .react-who{font-size:10px;color:#9DB6D4;margin-bottom:3px;} .react-txt{font-size:12px;line-height:1.5;color:#E4EDF6;}
  .cont{margin:18px auto 0;display:block;background:#fff;color:var(--navy);border:none;border-radius:10px;padding:12px 28px;font-size:13.5px;font-weight:600;}

  /* debrief */
  .result{background:var(--surface);border:1px solid var(--border);border-radius:18px;overflow:hidden;box-shadow:var(--shadow-lg);margin-top:22px;animation:rise .5s ease both;}
  .res-top{padding:30px 34px;color:#fff;}
  .res-top.survive{background:linear-gradient(150deg,#227A4E,#14512F);} .res-top.fail{background:linear-gradient(150deg,#B5433A,#7C2A24);}
  .res-verdict{font-size:11px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;opacity:.85;margin-bottom:10px;}
  .res-top h2{font-size:25px;font-weight:600;letter-spacing:-.02em;margin:0 0 8px;line-height:1.15;}
  .res-top p{font-size:13.5px;line-height:1.6;margin:0;opacity:.95;}
  .res-score{display:flex;align-items:baseline;gap:8px;margin-top:16px;}
  .res-score .big{font-size:42px;font-weight:700;letter-spacing:-.03em;font-family:'JetBrains Mono',monospace;line-height:1;}
  .res-score .max{font-size:15px;opacity:.7;} .res-score .gr{font-size:14px;font-weight:600;margin-left:auto;background:rgba(255,255,255,.18);padding:5px 13px;border-radius:100px;}
  .res-body{padding:24px 34px 30px;}
  .res-h{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted-soft);margin:22px 0 12px;}
  .res-h:first-child{margin-top:0;}
  .dim{margin-bottom:12px;}
  .dim-top{display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:5px;}
  .dim-top b{font-weight:600;} .dim-top .s{font-family:'JetBrains Mono',monospace;color:var(--muted);}
  .dim-note{font-size:11.5px;color:var(--muted);line-height:1.5;margin-top:3px;}
  .read{background:var(--panel);border-radius:11px;padding:15px 17px;margin-top:6px;font-size:13px;line-height:1.6;color:#38424E;}
  .read b{color:var(--navy);}

  /* timeline / game-film */
  .tl{border-left:2px solid var(--border);margin:4px 0 4px 8px;padding-left:0;}
  .tl-item{position:relative;padding:0 0 15px 20px;}
  .tl-item::before{content:'';position:absolute;left:-6px;top:3px;width:10px;height:10px;border-radius:50%;background:var(--muted-soft);border:2px solid #fff;}
  .tl-item.ask::before{background:var(--steel);} .tl-item.decision::before{background:var(--navy);}
  .tl-item.reveal::before{background:var(--amber);} .tl-item.miss::before{background:var(--alert);}
  .tl-item.info::before{background:var(--good);}
  .tl-when{font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--muted-soft);font-family:'JetBrains Mono',monospace;}
  .tl-txt{font-size:12.5px;line-height:1.5;color:#38424E;margin-top:2px;} .tl-txt b{color:var(--navy);}
  .tl-badge{display:inline-block;margin-top:6px;font-size:11px;font-weight:600;padding:3px 9px;border-radius:7px;line-height:1.4;}
  .tl-badge.good{background:var(--good-bg);color:#1F6B44;} .tl-badge.bad{background:var(--alert-bg);color:#9A342A;} .tl-badge.key{background:var(--steel-tint);color:var(--steel-deep);}
  .tl-badge .tl-note{font-weight:500;opacity:.85;}
  .tl-item.good::before{background:var(--good);} .tl-item.bad::before{background:var(--alert);box-shadow:0 0 0 3px var(--alert-bg);}

  /* coaching */
  .coach-intro{font-size:12.5px;line-height:1.6;color:var(--muted);margin-bottom:14px;}
  .coach{background:var(--steel-tint);border:1px solid var(--steel-tint-edge);border-radius:13px;padding:16px 18px;margin-bottom:12px;}
  .coach-h{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:9px;}
  .coach-dim{font-size:15px;font-weight:700;color:var(--navy);}
  .coach-sc{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--steel-deep);background:#fff;padding:3px 9px;border-radius:100px;}
  .coach-lead{font-size:12.5px;color:#3B4652;margin-bottom:9px;}
  .coach-list{margin:0;padding-left:20px;display:flex;flex-direction:column;gap:8px;}
  .coach-list li{font-size:13px;line-height:1.55;color:#2B3742;} .coach-list li b{color:var(--navy);}

  .ending{border-radius:14px;padding:18px 20px;margin-bottom:6px;border:1px solid var(--border);}
  .ending-tag{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;margin-bottom:8px;opacity:.85;}
  .ending h3{font-size:19px;line-height:1.25;margin:0 0 9px;letter-spacing:-.01em;}

  .hudclock .hc-hint{font-size:9.5px;font-weight:600;display:none;letter-spacing:.01em;}
